<!DOCTYPE html>
<html lang="en">

<head>
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Budget Tracker</h1>

        <input type="text" id="expense" placeholder="Enter the expense">

        <input type="number" id="amount" placeholder="Enter the amount">

        <select id="category">
            <option value="">Select Category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Other">Other</option>
        </select>

        <select id="filterCategory" onchange="filterExpenses()">
            <option value="All">All Categories</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Other">Other</option>
        </select>

        <button onclick="AddExpense()">ADD Expense</button>

        <ul id="expenseList"></ul>

        <h2>Total: $<span id="total">0</span></h2>

        <h3>Total Expenses: <span id="count">0</span></h3>

    </div>

    <script src="script.js"></script>

</body>

</html>
