<!Doctype html>
<html lang="en">
  <head>
    <title>Budget Tracker</title>
    <body>
      <h1>Budget Tracker</h1>
      <input type = "text" id="expense" placeholder="enter the expense">
      <input type ="number"id = "amount" placeholder = "enter the amount">
      <select id = "category">
        <option value="">Select Category</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Utilities">Utilities</option>
         <option value="Other">Other</option>
      </select>
      <select id="filterCategory" onchange="filterExpenses()">
        <option value="">Filter by Category</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Utilities">Utilities</option>
         <option value="Other">Other</option>
      </select>
      <button onclick="AddExpense()">ADD Expense</button>
      <p id="output"></p>
      <ul id = "expenseList"></ul>
      <h2>Total : $<span id="total">0</span></h2>
      <h3>Total Expenses: <span id="count">0</span></h3>
      <script src="script.js"></script>
      </body>
  </head>
</html>
